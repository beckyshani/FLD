<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">

<meta property="og:title" content="Feldman" />
<meta property="og:description" content="Check out our 2026 prices" />
<meta property="og:image" content="https://beckyshani.github.io/FLD/PriceBook/pages/preview.jpg" />
<meta property="og:type" content="website" />

<title>My Flipbook</title>

<script src="page-flip.js"></script>
<!-- ✅ CHANGE 1: Added PDF.js library -->
<script src="pdf.min.js"></script>

<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
background: #000;
display: flex;
padding-bottom: 80px;
min-height: 100vh;
overflow-y: auto;
overflow-x: auto;
font-family: "Calibri", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

#layout {
display: flex;
align-items: center;
gap: 15px;
padding-top: 60px;
padding-bottom: 0px;
padding-left: 10px;
padding-right: 10px;
margin: auto;
}

#flipbook-wrapper {
transition: left 0.5s ease, transform 0.5s ease;
position: relative;
}

#flipbook-container {
transform: scaleX(-1);
}

#flipbook-container .page {
background: #000;
overflow: hidden;
}

/* ✅ CHANGE 2: canvas gets the same mirror + sizing treatment as img/video had */
#flipbook-container .page img,
#flipbook-container .page video,
#flipbook-container .page canvas {
width: 100%;
height: 100%;
object-fit: contain;
transform: scaleX(-1);
display: block;
}



button {
background: transparent;
border: none;
color: white;
font-size: 36px;
padding: 16px 22px;
cursor: pointer;
border-radius: 6px;
transition: background 0.3s;
flex-shrink: 0;
position: relative;
z-index: 10;
}

button:hover {
background: rgba(255, 255, 255, 0.2);
}

#page-counter {
  position: fixed;
  top: -30px;
  left: -30px;
  transform: translateX(-50%);
  color: #fff;
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 1px;
  white-space: nowrap;
  z-index: 999;
}

#toolbar {
  position: fixed;
  background: #fff;
  bottom: 0;
  left: 0;
  width: 100%;
  border-radius: 0;
  padding: 0px 0;
  justify-content: center;
  display: flex;
  gap: 0px;
  align-items: center;
  z-index: 1000;
}

#toolbar button {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  padding: 2px 7px;
  border-radius: 0px;
  color: #333;
  transition: background 0.2s;
}

#toolbar button:hover {
  background: #c9c7c7;
}

#pages-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 998;
  overflow-y: auto;
  padding: 40px 20px 100px 20px;
}

#pages-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  justify-content: center;
}

/* ✅ CHANGE 3: thumbnails are now <canvas> elements, not <img> */
#pages-grid canvas {
  width: 120px;
  height: auto;
  cursor: pointer;
  border: 3px solid transparent;
  border-radius: 4px;
  transition: border 0.2s;
  display: block;
}

#pages-grid canvas:hover {
  border-color: #fff;
}

.page-thumb-label {
  color: #fff;
  text-align: center;
  font-size: 12px;
  margin-top: 4px;
}

.page-thumb-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#touch-blocker {
  display: none;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 5;
}
</style>
</head>

<body>
<div id="toolbar">
  <button title="Zoom In">🔍+</button>
  <button title="Zoom Out">🔍-</button>
  <button title="Fullscreen">⛶</button>
  <button title="Print">🖨️</button>
  <button title="Download PDF" onclick="downloadPDF()">⬇</button>
  <button title="Pages" onclick="togglePagesOverlay()">☰</button>
</div>

<div id="pages-overlay">
  <div id="pages-grid"></div>
</div>

<div id="layout">
  <button id="btn-next">❮</button>
  <div id="flipbook-wrapper">
    <div id="touch-blocker"></div>
    <div id="page-counter"></div>
    <div id="flipbook-container">
      <!-- pages injected here -->
    </div>
  </div>
  <button id="btn-prev">❯</button>
</div>

<audio id="flipSound" src="sounds/flip.mp3"></audio>

<script>
// ✅ CHANGE 4: Set the PDF.js worker source (required by PDF.js)
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
window.RTL_FLIPBOOK = true;
const container = document.getElementById('flipbook-container');
let i = 1;
let totalPages = 0;
let pageFlip;
let focusSide = 'left';

const A4_WIDTH = 595;
const A4_HEIGHT = 842;

let PAGE_WIDTH, PAGE_HEIGHT;

if (isMobile) {
  const padding = 40;
  PAGE_WIDTH = window.innerWidth - padding;
  PAGE_HEIGHT = PAGE_WIDTH * (A4_HEIGHT / A4_WIDTH);
} else {
  const multiplier = 1;
  PAGE_WIDTH = A4_WIDTH * multiplier;
  PAGE_HEIGHT = A4_HEIGHT * multiplier;
}

function updateCounter(pageIndex) {
  const counter = document.getElementById('page-counter');
  if (pageIndex <= 1) {
    counter.textContent = `1`;
    document.getElementById('btn-prev').style.visibility = 'hidden';
  } else {
    const left = pageIndex;
    const right = Math.min(pageIndex + 1, totalPages);
    counter.textContent = left === right ? `${left}` : `${left}-${right}`;
    document.getElementById('btn-prev').style.visibility = 'visible';
    document.getElementById('btn-next').style.visibility =
      (pageIndex >= (isMobile ? totalPages : totalPages - 1)) ? 'hidden' : 'visible';
  }
}

// ✅ CHANGE 5: Helper — renders a PDF file's first page into a <canvas> at the given pixel size
async function renderPDFToCanvas(url, width, height) {
  const pdf = await pdfjsLib.getDocument(url).promise;
  const page = await pdf.getPage(1);

  const dpr = window.devicePixelRatio || 1; // ✅ get screen pixel ratio (e.g. 2 on retina)

  const nativeViewport = page.getViewport({ scale: 1 });
  const scale = (width / nativeViewport.width) * dpr; // ✅ render at physical pixel size
  const viewport = page.getViewport({ scale });

  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;   // physical pixels (e.g. 1190 on retina)
  canvas.height = viewport.height;
  canvas.style.width = width + 'px';   // ✅ CSS size stays the same as before
  canvas.style.height = height + 'px';

  await page.render({
    canvasContext: canvas.getContext('2d'),
    viewport
  }).promise;

  return canvas;
}

// ✅ CHANGE 6: Completely replaced loadPages() — no more mp4/jpg, all PDFs
async function loadPages() {
  // Add a blank first page (right-hand cover opens to blank left side)
  if (i === 1) {
    const blank = document.createElement('div');
    blank.className = 'page';
    container.appendChild(blank);
  }

  try {
    // Check if the next PDF exists by fetching its headers
    const res = await fetch('pages/' + i + '.pdf', { method: 'HEAD' });
    if (!res.ok) throw new Error('not found');

    // Render the PDF page into a canvas
    const canvas = await renderPDFToCanvas('pages/' + i + '.pdf', PAGE_WIDTH, PAGE_HEIGHT);

    const page = document.createElement('div');
    page.className = 'page';
    page.appendChild(canvas);
    container.appendChild(page);

    i++;
    loadPages(); // continue loading next page
  } catch (e) {
    // No more pages — finalise
    totalPages = i - 1;
    initFlipbook();
  }
}

// Mobile setup
if (isMobile) {
  document.getElementById('touch-blocker').style.display = 'block';
  document.body.style.overflow = 'hidden';

  const btnNext = document.getElementById('btn-next');
  const btnPrev = document.getElementById('btn-prev');
  const gap = 10;

  btnNext.style.position = 'fixed';
  btnNext.style.top = '50%';
  btnNext.style.transform = 'translateY(-50%)';
  btnNext.style.zIndex = '999';
  btnNext.style.left = (gap) + 'px';
  btnNext.style.right = 'auto';

  btnPrev.style.position = 'fixed';
  btnPrev.style.top = '50%';
  btnPrev.style.transform = 'translateY(-50%)';
  btnPrev.style.zIndex = '999';
  btnPrev.style.right = (gap) + 'px';
  btnPrev.style.left = 'auto';

  const toolbar = document.getElementById('toolbar');
  toolbar.style.padding = '10px 0';
  const toolbarButtons = toolbar.querySelectorAll('button');
  toolbarButtons.forEach(btn => {
    btn.style.fontSize = '28px';
    btn.style.padding = '10px 14px';
  });
  const counter = document.getElementById('page-counter');
  counter.style.top = '10px';
  counter.style.left = '10px';
  counter.style.transform = 'none';
}

function initFlipbook() {
  pageFlip = new St.PageFlip(container, {
    width: PAGE_WIDTH,
    height: PAGE_HEIGHT,
    drawShadow: true,
    flippingTime: 1000,
    usePortrait: false,
    autoSize: false,
    showCover: false,
    mobileScrollSupport: false,
  });

  const wrapper = document.getElementById('flipbook-wrapper');
  pageFlip.loadFromHTML(document.querySelectorAll('#flipbook-container .page'));

  if (isMobile) {
    wrapper.style.position = 'fixed';
    wrapper.style.top = '50%';
    wrapper.style.marginTop = `-${PAGE_HEIGHT / 2}px`;
    wrapper.style.left = (window.innerWidth / 2 - PAGE_WIDTH / 2) + 'px';
  } else {
    wrapper.style.transform = `translateX(${PAGE_WIDTH / 2}px)`;
  }

  updateCounter(1);

  pageFlip.on('flip', function (e) {
    const sound = document.getElementById('flipSound');
    sound.currentTime = 0;
    sound.play();

    if (e.data <= 1) {
      if (isMobile) {
        wrapper.style.left = (window.innerWidth / 2 - PAGE_WIDTH / 2) + 'px';
      } else {
        wrapper.style.transform = `translateX(${PAGE_WIDTH / 2}px)`;
      }
      updateCounter(1);
    } else {
      if (isMobile) {
        const left = focusSide === 'right'
          ? window.innerWidth / 2 - PAGE_WIDTH * 1.5
          : window.innerWidth / 2 - PAGE_WIDTH / 2;
        wrapper.style.left = left + 'px';
      } else {
        wrapper.style.transform = 'translateX(0)';
      }
      updateCounter(e.data);
    }
  });
}

function setFocus(side) {
  const wrapper = document.getElementById('flipbook-wrapper');
  if (isMobile) {
    const left = side === 'right'
      ? window.innerWidth / 2 - PAGE_WIDTH * 1.5
      : window.innerWidth / 2 - PAGE_WIDTH / 2;
    wrapper.style.left = left + 'px';
    focusSide = side;
  } else {
    wrapper.style.transform = side === 'right'
      ? `translateX(-${PAGE_WIDTH / 2}px)`
      : `translateX(${PAGE_WIDTH / 2}px)`;
    focusSide = side;
  }
  if (isMobile) {
    const currentPage = pageFlip.getCurrentPageIndex();
    if (currentPage >= totalPages - 1 && side === 'left') {
      document.getElementById('btn-next').style.visibility = 'hidden';
    } else {
      document.getElementById('btn-next').style.visibility = 'visible';
    }
  }
}

document.getElementById('btn-next').addEventListener('click', function () {
  if (!isMobile) {
    pageFlip.flipNext();
    return;
  }
  if (focusSide === 'left') {
    pageFlip.flipNext();
    setFocus('right');
  } else {
    setFocus('left');
  }
});

document.getElementById('btn-prev').addEventListener('click', function () {
  if (!isMobile) {
    pageFlip.flipPrev();
    return;
  }
  if (focusSide === 'right') {
    pageFlip.flipPrev();
    setFocus('left');
  } else {
    setFocus('right');
  }
});

loadPages();

// Zoom
let zoomLevel = 1;

document.querySelector('[title="Zoom In"]').addEventListener('click', function () {
  zoomLevel = Math.min(zoomLevel + 0.1, 2);
  document.getElementById('layout').style.zoom = zoomLevel;
});

document.querySelector('[title="Zoom Out"]').addEventListener('click', function () {
  zoomLevel = Math.max(zoomLevel - 0.1, 0.5);
  document.getElementById('layout').style.zoom = zoomLevel;
});

document.querySelector('[title="Fullscreen"]').addEventListener('click', function () {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
});

document.querySelector('[title="Print"]').addEventListener('click', function () {
  window.print();
});

function downloadPDF() {
  fetch('flipbook.pdf')
    .then(res => res.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'katalog2026.pdf';
      a.click();
      URL.revokeObjectURL(url);
    });
}

let overlayBuilt = false;

// ✅ CHANGE 7: Thumbnails in the overlay are now rendered canvases instead of <img> tags
async function togglePagesOverlay() {
  const overlay = document.getElementById('pages-overlay');
  if (overlay.style.display === 'flex') {
    overlay.style.display = 'none';
    return;
  }

  if (!overlayBuilt) {
    overlayBuilt = true; // ✅ Set immediately — prevents double-build if clicked again while loading
    const grid = document.getElementById('pages-grid');
    for (let p = 1; p <= totalPages; p++) {
      const wrap = document.createElement('div');
      wrap.className = 'page-thumb-wrap';

      const thumbCanvas = await renderPDFToCanvas('pages/' + p + '.pdf', 120, 120 * (A4_HEIGHT / A4_WIDTH));
      thumbCanvas.style.width = '120px';
      thumbCanvas.style.height = 'auto';

      const pageNum = p;
      thumbCanvas.addEventListener('click', function () {
        pageFlip.flip(pageNum);
        overlay.style.display = 'none';
      });

      const label = document.createElement('div');
      label.className = 'page-thumb-label';
      label.textContent = p;

      wrap.appendChild(thumbCanvas);
      wrap.appendChild(label);
      grid.appendChild(wrap);
    }
  }

  overlay.style.display = 'flex';
}
</script>

</body>
</html>

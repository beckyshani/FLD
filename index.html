<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Flipbook</title>

<script src="page-flip.js"></script>

<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
background: #000;
display: flex;
padding-bottom: 80px;
min-height: 100vh;
overflow-y: auto;
overflow-x: auto;
font-family: "Calibri", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

}

#layout {
display: flex;
align-items: center;
gap: 15px;
padding-top: 60px;
padding-bottom: 0px;
padding-left: 10px;
padding-right: 10px;
margin: auto;

}

#flipbook-wrapper {
transition: transform 0.5s ease;
position: relative
}

#flipbook-container {
transform: scaleX(-1);
}

#flipbook-container .page {
background: #000;
    overflow: hidden;  /* ← add this */
}

    
#flipbook-container .page img,
#flipbook-container .page video {
width: 100%;
height: 100%;
object-fit: contain;
transform: scaleX(-1);
    display: block;  /* ← add this */
}


button {
background: #6D6D6D;
border: none;
color: white;
font-size: 36px;
padding: 16px 22px;
cursor: pointer;
border-radius: 6px;
transition: background 0.3s;
flex-shrink: 0;
}
#page-counter {
  position: fixed;
  top: -30px;
  left: -50px;
  color: #fff;
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 1px;
  white-space: nowrap;
  z-index: 999;
}

#toolbar {
  position: fixed;
  background: #fff;
	bottom: 0;
	left: 0;
	width: 100%;
	border-radius: 0;
	padding: 0px 0;
	justify-content: center;
	display: flex;
	gap: 0px;
	align-items: center;
	z-index: 1000;
}

#toolbar button {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  padding: 2px 7px;
  border-radius: 0px;
  color: #333;
  transition: background 0.2s;
}

#toolbar button:hover {
  background: #c9c7c7;
  }
  
  #pages-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 998;
  overflow-y: auto;
  padding: 40px 20px 100px 20px;
}

#pages-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  justify-content: center;
}

#pages-grid img {
  width: 120px;
  height: auto;
  cursor: pointer;
  border: 3px solid transparent;
  border-radius: 4px;
  transition: border 0.2s;
}

#pages-grid img:hover {
  border-color: #fff;
}

.page-thumb-label {
  color: #fff;
  text-align: center;
  font-size: 12px;
  margin-top: 4px;
}

.page-thumb-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;

}
</style>
</head>

<body>
<div id="toolbar">
  <button title="Zoom In">🔍+</button>
  <button title="Zoom Out">🔍-</button>
  <button title="Fullscreen">⛶</button>
  <button title="Print">🖨️</button>
  <button title="Download PDF" onclick="downloadPDF()">⬇</button>
  <button title="Pages" onclick="togglePagesOverlay()">☰</button>


</div>
<div id="pages-overlay">
  <div id="pages-grid"></div>
</div>
<div id="layout">
<button id="btn-prev">❮</button>

<div id="flipbook-wrapper">
<div id="page-counter"></div>
<div id="flipbook-container">
<!-- pages injected here -->
</div>
</div>

<button id="btn-next">❯</button>
</div>

<audio id="flipSound" src="sounds/flip.mp3"></audio>

<script>
window.RTL_FLIPBOOK = true;
const container = document.getElementById('flipbook-container');
let i = 1;
let totalPages = 0;
let pageFlip;

function updateCounter(pageIndex) {
const counter = document.getElementById('page-counter');
if (pageIndex <= 1) {
// Cover — showing only page 1
counter.textContent = `1`;
document.getElementById('btn-prev').style.visibility = 'visible';

} else {
// Spread — showing two pages
const left = pageIndex;
const right = Math.min(pageIndex + 1, totalPages);
counter.textContent = left === right
? `${left}`
: `${left}-${right}`;
document.getElementById('btn-prev').style.visibility =
  (pageIndex >= totalPages - 1) ? 'hidden' : 'visible';

}
}
const multiplier = 0.8
const A4_WIDTH = 595;   // A4 landscape ratio (297x210)
const A4_HEIGHT = 842;
const PAGE_WIDTH  = A4_WIDTH * multiplier
const PAGE_HEIGHT = A4_HEIGHT * multiplier



function loadPages() {
if (i === 1) {
const blank = document.createElement('div');
blank.className = 'page';
container.appendChild(blank);
// First page is a video
const page = document.createElement('div');
page.className = 'page';
const video = document.createElement('video');
video.src = 'pages/1.mp4';
video.autoplay = true;
video.muted = true;
video.playsInline = true;
page.appendChild(video);
container.appendChild(page);
i = 2; // skip to page 2 for image loading
loadPages();
return;
}

const img = new Image();
img.src = "pages/" + i + ".jpg";

img.onload = function () {
const page = document.createElement('div');
page.className = 'page';
const image = document.createElement('img');
image.src = "pages/" + i + ".jpg";
page.appendChild(image);
container.appendChild(page);
i++;
loadPages();
};

img.onerror = function () {
totalPages = i - 1; // save total (excluding blank page)
initFlipbook();
};
}

function initFlipbook() {
pageFlip = new St.PageFlip(container, {
width: PAGE_WIDTH,
height: PAGE_HEIGHT,
drawShadow: true,
flippingTime: 1000,
usePortrait: false,
autoSize: false,
showCover: false,
mobileScrollSupport: false,
});

const wrapper = document.getElementById('flipbook-wrapper');

pageFlip.loadFromHTML(document.querySelectorAll('#flipbook-container .page'));

wrapper.style.transform = `translateX(${PAGE_WIDTH / 2}px)`;
updateCounter(1); // show 1/total on load

pageFlip.on('flip', function (e) {
const sound = document.getElementById('flipSound');
sound.currentTime = 0;
sound.play();

if (e.data <= 1) {
wrapper.style.transform = `translateX(${PAGE_WIDTH / 2}px)`;
updateCounter(1);
} else {
wrapper.style.transform = 'translateX(0)';
updateCounter(e.data); // e.data is the current page index
}
});
}

document.getElementById('btn-prev').addEventListener('click', function () {
pageFlip.flipNext();
});

document.getElementById('btn-next').addEventListener('click', function () {
pageFlip.flipPrev();
});

loadPages();

// Zoom
let zoomLevel = 1;

document.querySelector('[title="Zoom In"]').addEventListener('click', function() {
  zoomLevel = Math.min(zoomLevel + 0.1, 2);
  document.getElementById('layout').style.zoom = zoomLevel;
});

document.querySelector('[title="Zoom Out"]').addEventListener('click', function() {
  zoomLevel = Math.max(zoomLevel - 0.1, 0.5);
  document.getElementById('layout').style.zoom = zoomLevel;
});

// Fullscreen
document.querySelector('[title="Fullscreen"]').addEventListener('click', function() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
});

// Print
document.querySelector('[title="Print"]').addEventListener('click', function() {
  window.print();
});

function downloadPDF() {
  fetch('flipbook.pdf')
    .then(res => res.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'flipbook.pdf';
      a.click();
      URL.revokeObjectURL(url);
    });
}


let overlayBuilt = false;

function togglePagesOverlay() {
  const overlay = document.getElementById('pages-overlay');
  if (overlay.style.display === 'flex') {
    overlay.style.display = 'none';
    return;
  }

  if (!overlayBuilt) {
    const grid = document.getElementById('pages-grid');
    for (let p = 1; p <= totalPages; p++) {
      const wrap = document.createElement('div');
      wrap.className = 'page-thumb-wrap';

      const img = document.createElement('img');
      img.src = 'pages/' + p + '.jpg';
      img.addEventListener('click', function() {
        pageFlip.flip(p);
        overlay.style.display = 'none';
      });

      const label = document.createElement('div');
      label.className = 'page-thumb-label';
      label.textContent = p;

      wrap.appendChild(img);
      wrap.appendChild(label);
      grid.appendChild(wrap);
    }
    overlayBuilt = true;
  }

  overlay.style.display = 'flex';
}

</script>

</body>
</html>
